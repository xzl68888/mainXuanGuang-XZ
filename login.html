<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XG · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #0a0a0f;
  --bg-card: rgba(20, 16, 28, 0.92);
  --accent-cyan: #00e5ff;
  --accent-red: #ff3b5c;
  --text-primary: #ffffff;
  --text-dim: #a0a0b0;
  --border-subtle: rgba(255,255,255,0.1);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Noto Sans SC', sans-serif;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: var(--bg-void); color: var(--text-primary); font-family: var(--font-sans); }

.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: url('bg.jpg') center/cover no-repeat fixed;
}
.bg-layer::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(10,4,8,0.5) 0%, rgba(20,6,10,0.6) 50%, rgba(8,4,12,0.55) 100%);
  backdrop-filter: blur(2px);
}

.login-container {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
}

.login-card {
  width: 380px; padding: 40px 36px;
  background: rgba(16, 12, 22, 0.92);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 60px rgba(255,59,92,0.06);
  animation: cardIn .5s ease-out;
}

.logo-section { text-align: center; margin-bottom: 32px; }
.logo-icon {
  width: 64px; height: 64px; border-radius: 16px;
  background: linear-gradient(135deg, var(--accent-red), var(--accent-cyan));
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 16px;
  box-shadow: 0 0 30px rgba(0,229,255,0.2);
}
.logo-title { font-size: 22px; font-weight: 700; color: var(--accent-cyan); letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,229,255,0.3); }
.logo-sub { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; letter-spacing: 1px; }

.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }
.form-input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; color: var(--text-primary);
  font-family: var(--font-sans); font-size: 14px;
  outline: none; transition: border-color .25s, box-shadow .25s;
}
.form-input:focus { border-color: rgba(0,229,255,0.5); box-shadow: 0 0 0 3px rgba(0,229,255,0.12), 0 0 20px rgba(0,229,255,0.06); }
.form-input::placeholder { color: rgba(160,160,176,0.6); }

.login-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #ff3b5c, #ff3b5ccc);
  border: none; border-radius: 10px;
  color: white; font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: all .25s;
}
.login-btn:hover { box-shadow: 0 0 30px rgba(255,59,92,0.4); transform: translateY(-1px); }
.login-btn:active { transform: scale(0.98); }

.error-msg { color: var(--accent-red); font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }

@keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <div class="logo-icon" style="background:none;">
      <img src="xg-logo.jpg" alt="XG Logo" style="width:64px;height:64px;object-fit:contain;border-radius:12px;box-shadow:0 0 30px rgba(0,229,255,0.2);">
    </div>
      <div class="logo-title">XG 自焚聊天室</div>
      <div class="logo-sub">BURN AFTER READING</div>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" id="usernameInput" type="text" placeholder="输入你的代号..." maxlength="20" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">房间号 <span style="opacity:0.5">(可选)</span></label>
        <input class="form-input" id="roomInput" type="text" placeholder="留空使用默认房间" maxlength="30" autocomplete="off">
      </div>
      <button class="login-btn" type="submit">进入聊天室 →</button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('usernameInput').value.trim();
  const room = document.getElementById('roomInput').value.trim() || 'default';
  if (!username) { document.getElementById('errorMsg').textContent = '请输入用户名'; return; }
  localStorage.setItem('xg_username', username);
  localStorage.setItem('xg_room', room);
  window.location.href = 'chat.html';
}
</script>
</body>
</html>
